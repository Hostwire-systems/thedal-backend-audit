name: Deploy App  main


on:
  workflow_dispatch:
  push:
   branches:
     - main-backup

jobs:
   deploy:
    runs-on: [self-hosted, main-backup]
    if: ${{ always() }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3


      - name: Stop Process
        run: sudo systemctl stop thedal-service

      - name: Build and Deploy
        working-directory: /home/ec2-user/actions-runner/_work/thedal-backend/thedal-backend/thedal-app/
        run:  /home/ec2-user/actions-runner/_work/thedal-backend/thedal-backend/thedal-app/mvnw clean install

      - name: Start Process
        run: sudo systemctl start thedal-service
