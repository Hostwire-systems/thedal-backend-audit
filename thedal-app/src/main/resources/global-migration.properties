# Global Migration Configuration
# These properties control the behavior of the global migration system

# Batch processing settings
migration.global.batch-size=500
migration.global.max-concurrent-jobs=3
migration.global.timeout-minutes=60
migration.global.retry-attempts=3
migration.global.memory-threshold=0.85

# Thread pool configuration for migration execution
migration.global.thread-pool.core-size=2
migration.global.thread-pool.max-size=5
migration.global.thread-pool.queue-capacity=100
migration.global.thread-pool.keep-alive=60

# Performance tuning
migration.global.enable-batch-insert=true
migration.global.enable-parallel-processing=true
migration.global.memory-check-interval=1000

# Safety settings
migration.global.enable-crash-protection=true
migration.global.enable-automatic-retry=true
migration.global.enable-progress-persistence=true

# Monitoring and logging
migration.global.enable-detailed-logging=true
migration.global.enable-performance-metrics=true
migration.global.log-progress-interval=100
