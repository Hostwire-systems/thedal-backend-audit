cashfree.api.client-id=${CASHFREE_CLIENT_ID:}
cashfree.api.client-secret=${CASHFREE_CLIENT_SECRET:}
cashfree.api.public-key-path=${CASHFREE_PUBLIC_KEY_PATH:classpath:accountId_1240656_public_key.pem}
cashfree.api.otp-url=${CASHFREE_OTP_URL:https://sandbox.cashfree.com/verification/offline-aadhaar/otp}
cashfree.api.verify-url=${CASHFREE_VERIFY_URL:https://sandbox.cashfree.com/verification/offline-aadhaar/verify}
