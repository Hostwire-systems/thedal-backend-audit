# OAuth2 Configuration for Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.scope[0]=email
spring.security.oauth2.client.registration.google.scope[1]=profile

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Python OCR Service Configuration
thedal.ocr.service.url=${PYTHON_OCR_SERVICE_URL:http://localhost:5000}
thedal.ocr.service.timeout=${PYTHON_OCR_SERVICE_TIMEOUT:1200000}
thedal.ocr.service.max-retries=${PYTHON_OCR_SERVICE_MAX_RETRIES:3}
thedal.ocr.service.retry-delay=${PYTHON_OCR_SERVICE_RETRY_DELAY:5000}

# Photo Storage Configuration
thedal.photo.storage.path=${THEDAL_PHOTO_STORAGE_PATH:${java.io.tmpdir}/thedal-photos}
thedal.photo.cleanup.max-age-hours=${THEDAL_PHOTO_CLEANUP_MAX_AGE_HOURS:24}

# Family Mapping Sync Configuration
