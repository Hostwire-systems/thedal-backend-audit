spring.application.name=thedal-app


#server.address=0.0.0.0
server.port=8080

server.forward-headers-strategy=native

# Reporting Service Configuration
reporting.service.url=http://localhost:8081

# store type either in-memory or jdbc to store in D
spring.quartz.job-store-type=jdbc
# to create tables used to store job and other scheduling activities
spring.quartz.jdbc.initialize-schema=always


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/thedal}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration - Production optimized
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.leak-detection-threshold=120000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=ThedalHikariPool
spring.datasource.hikari.auto-commit=false
# TCP keepalive to prevent connection resets during long operations
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true
spring.datasource.hikari.data-source-properties.socketTimeout=60

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.jdbc.fetch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
# Fix connection leak during schema migration
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
# Disable all Hibernate schema validation
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.javax.persistence.schema-generation.database.action=none

# Flyway migration configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
# Temporary ignore removed after migration renaming; ensure Flyway 'repair' executed on DB first if checksums mismatched.
spring.flyway.out-of-order=true
## TEMP: Allow startup when a migration applied in DB (e.g., 1.16) is missing locally.
# Remove after running Flyway REPAIR on the target DB or restoring the missing migration.
spring.flyway.ignore-missing-migrations=true

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017}
spring.data.mongodb.database=${MONGODB_DATABASE:thedal_db}


# Logging configuration
# logging.file.name=voter-service.log
logging.level.com.thedal.thedal_app.voter=DEBUG
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# SQL logging - DISABLED
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false
# logging.level.org.hibernate.type.descriptor.sql=DEBUG
# logging.level.org.hibernate.SQL=DEBUG

