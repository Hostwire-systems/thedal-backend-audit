# Logging configuration
logging.level.org.sprisngframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.springframework.data.mongodb.repository.query=DEBUG



# Image file size limit
files.image.size.min=0
files.image.size.max=50000000

# Bulk photo upload configuration
# Bulk photo ZIP max size (in bytes). Override with env THEDAL_PHOTO_BULK_ZIP_MAX_BYTES
thedal.photo.bulk-zip.max-bytes=${THEDAL_PHOTO_BULK_ZIP_MAX_BYTES:5000000000}
# Batch size for processing photos (CONSERVATIVE: 100 to prevent memory issues)
thedal.photo.bulk.batch-size=${THEDAL_PHOTO_BULK_BATCH_SIZE:100}
# Number of parallel threads for S3 uploads (CONSERVATIVE: 10 to prevent system overload)
thedal.photo.bulk.parallel-threads=${THEDAL_PHOTO_BULK_PARALLEL_THREADS:10}

#multipart file
spring.servlet.multipart.enabled=true
# Allow uploads up to 4GB
spring.servlet.multipart.max-file-size=4GB
spring.servlet.multipart.max-request-size=4GB
# Write multipart content to disk beyond 2MB to reduce memory usage
spring.servlet.multipart.file-size-threshold=2MB

# Tomcat connectors: disable request size caps and swallow size limits for large uploads
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1

#inititalizing DB during startup
spring.sql.init.mode=always

#generated secret key for jwt
jwt.secret.key=${JWT_SECRET_KEY:}
jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:30}
jwt.refresh-token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION:60}

#config for smtp mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}


# AWS Configuration
aws.s3.accessKey=${AWS_S3_ACCESS_KEY:}
aws.s3.secretKey=${AWS_S3_SECRET_KEY:}
aws.s3.endpoint=${AWS_S3_ENDPOINT:}
aws.s3.region=${AWS_S3_REGION:ap-south-1}
aws.s3.image.bucket=${AWS_S3_IMAGE_BUCKET:}
aws.s3.notification.bucket=${AWS_S3_NOTIFICATION_BUCKET:}
aws.s3.notification.folder=${AWS_S3_NOTIFICATION_FOLDER:templates/notifications}


aws.s3.banner.bucket=${AWS_S3_BANNER_BUCKET:}
aws.s3.files.bucket=${AWS_S3_FILES_BUCKET:}
aws.s3.export.bucket=${AWS_S3_EXPORT_BUCKET:}
aws.access.key=${AWS_ACCESS_KEY:}
aws.secret.key=${AWS_SECRET_KEY:}
aws.sqs.queue.url=${AWS_SQS_QUEUE_URL:}

# email platform
sendgrid.key=${SENDGRID_KEY:}
sendgrid.email=${SENDGRID_EMAIL:}

notification.email.recipient=${NOTIFICATION_EMAIL_RECIPIENT:}
aws.s3.cadre.bucket=${AWS_S3_CADRE_BUCKET:}

# Redis Configuration
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.username=${REDIS_USERNAME:}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}




# Server URLs
thedal.domain.name=${THEDAL_DOMAIN_NAME:localhost}
thedal.ui.url=${THEDAL_UI_URL:http://localhost:3000/}
thedal.server.url=${THEDAL_SERVER_URL:http://localhost:8080/}
