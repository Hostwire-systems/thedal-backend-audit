# Server Configuration
server.port=8081

# Database Configuration - Using same DB as main app for now
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/thedal}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings for Neon
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration - Disable DDL operations for now
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Disable Flyway temporarily
spring.flyway.enabled=false

# Flyway Configuration - Disabled for testing
spring.flyway.enabled=false
# spring.flyway.locations=classpath:db/migration/reporting
# spring.flyway.baseline-on-migrate=true

# Logging
logging.level.com.thedal.reporting=INFO
logging.level.org.springframework.web=INFO
